<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info And Stuff</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Info And Stuff</h1>

        <div class="info-section">
            <h2>Important Information</h2>
            <p id="displayText">No information has been set yet.</p>
        </div>

        <div class="editor-section">
            <h2>Edit Information</h2>
            <textarea id="infoInput" placeholder="Type your information here..."></textarea>
            <button onclick="saveInfo()">Save</button>
        </div>
    </div>

    <script>
        const displayText = document.getElementById("displayText");
        const infoInput = document.getElementById("infoInput");

        // Load saved information
        const savedInfo = localStorage.getItem("websiteInfo");
        if (savedInfo) {
            displayText.textContent = savedInfo;
            infoInput.value = savedInfo;
        }

        function saveInfo() {
            const text = infoInput.value.trim();

            if (text === "") {
                alert("Please enter some information.");
                return;
            }

            localStorage.setItem("websiteInfo", text);
            displayText.textContent = text;

            alert("Information saved!");
        }
    </script>

</body>
</html>
